name: Auto Generate tools.json

on:
  push:
    branches:
      - main
    paths:
      - "tools/**/index.html"
      - "generate-json.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tools-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate data/tools.json
        run: node generate-json.js

      - name: Commit generated file if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/tools.json; then
            echo "No changes in data/tools.json"
            exit 0
          fi

          git add data/tools.json
          git commit -m "chore: auto-generate tools.json"
          git push
