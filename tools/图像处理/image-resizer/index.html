<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片尺寸调整工具</title>
  <meta name="description" content="在线调整图片尺寸，支持等比例缩放，无需上传服务器">
  <meta name="icon" content="🖼️">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:  #4f6ef7;
      --bg:      #f5f6fa;
      --panel:   #ffffff;
      --text:    #2d3748;
      --muted:   #718096;
      --border:  #e2e8f0;
      --success: #38a169;
      --error:   #e53e3e;
      --radius:  10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                   'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶栏 ─────────────────────────────────── */
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .back-btn { font-size: .82rem; color: var(--accent); text-decoration: none; }
    .back-btn:hover { text-decoration: underline; }
    .topbar-title { font-size: 1rem; font-weight: 600; }
    .topbar-icon  { font-size: 1.3rem; }

    /* ── 主体 ─────────────────────────────────── */
    .main {
      flex: 1;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 上传区 */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .dropzone:hover, .dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(79,110,247,.04);
    }
    .dropzone input[type="file"] { display: none; }
    .dropzone-icon { font-size: 2.6rem; margin-bottom: 12px; }
    .dropzone-hint { font-size: .88rem; color: var(--muted); line-height: 1.8; }
    .dropzone-hint strong { color: var(--accent); }

    /* 控制面板 */
    .controls {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ctrl-group label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .ctrl-group input[type="number"],
    .ctrl-group select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: .88rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      width: 120px;
      transition: border-color .2s, box-shadow .2s;
    }
    .ctrl-group input[type="number"]:focus,
    .ctrl-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,110,247,.1);
    }

    .lock-ratio {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .85rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      padding: 8px 0 0;
    }
    .lock-ratio input { accent-color: var(--accent); }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 7px;
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-default {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-default:hover { background: var(--bg); }

    /* 信息行 */
    .info-bar {
      font-size: .82rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 10px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .info-bar span { display: flex; align-items: center; gap: 5px; }
    .info-bar strong { color: var(--text); }

    /* 预览区 */
    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .preview-pane {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pane-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .preview-box {
      background: repeating-conic-gradient(#e2e8f0 0% 25%, #fff 0% 50%)
                  0 0 / 16px 16px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      overflow: hidden;
    }
    .preview-box img {
      max-width: 100%;
      max-height: 320px;
      display: block;
      object-fit: contain;
    }
    .preview-placeholder {
      color: var(--muted);
      font-size: .85rem;
    }

    canvas { display: none; }

    @media (max-width: 640px) {
      .preview-row { grid-template-columns: 1fr; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="../../..">← 返回导航</a>
  <span style="color:var(--border)">|</span>
  <span class="topbar-icon">🖼️</span>
  <span class="topbar-title">图片尺寸调整工具</span>
</div>

<div class="main">

  <!-- 拖拽上传区 -->
  <label class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="dropzone-icon">🖼️</div>
    <div class="dropzone-hint">
      <strong>点击选择图片</strong>，或将图片拖拽到此处<br>
      支持 JPG、PNG、GIF、WebP、SVG 等格式 · 图片不会上传到任何服务器
    </div>
  </label>

  <!-- 信息栏（加载后显示） -->
  <div class="info-bar" id="infoBar" style="display:none">
    <span>📄 文件名：<strong id="infoName">-</strong></span>
    <span>📐 原始尺寸：<strong id="infoSize">-</strong></span>
    <span>📦 文件大小：<strong id="infoFileSize">-</strong></span>
  </div>

  <!-- 控制面板 -->
  <div class="controls" id="controlsPane" style="display:none">
    <div class="ctrl-group">
      <label>宽度 (px)</label>
      <input type="number" id="inputW" min="1" max="8000" placeholder="宽">
    </div>
    <div class="ctrl-group">
      <label>高度 (px)</label>
      <input type="number" id="inputH" min="1" max="8000" placeholder="高">
    </div>
    <label class="lock-ratio">
      <input type="checkbox" id="lockRatio" checked>
      锁定宽高比
    </label>
    <div class="ctrl-group">
      <label>输出格式</label>
      <select id="formatSel">
        <option value="image/png">PNG</option>
        <option value="image/jpeg">JPEG</option>
        <option value="image/webp">WebP</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>质量（JPEG/WebP）</label>
      <input type="number" id="qualityInput" min="1" max="100" value="92" placeholder="1-100">
    </div>
    <div style="display:flex;gap:8px;align-items:flex-end">
      <button class="btn btn-primary" id="btnResize">调整并预览</button>
      <button class="btn btn-default" id="btnDownload" disabled>下载图片</button>
      <button class="btn btn-default" id="btnReset">重选图片</button>
    </div>
  </div>

  <!-- 预览 -->
  <div class="preview-row" id="previewRow" style="display:none">
    <div class="preview-pane">
      <div class="pane-label">原图预览</div>
      <div class="preview-box"><img id="previewOrig" alt="原图"></div>
    </div>
    <div class="preview-pane">
      <div class="pane-label">调整后预览</div>
      <div class="preview-box" id="resultBox">
        <span class="preview-placeholder">点击"调整并预览"后显示</span>
      </div>
    </div>
  </div>

</div>

<!-- 隐藏 Canvas 用于绘制 -->
<canvas id="canvas"></canvas>

<script>
(function () {
  'use strict';

  const fileInput    = document.getElementById('fileInput');
  const dropzone     = document.getElementById('dropzone');
  const infoBar      = document.getElementById('infoBar');
  const controlsPane = document.getElementById('controlsPane');
  const previewRow   = document.getElementById('previewRow');
  const previewOrig  = document.getElementById('previewOrig');
  const resultBox    = document.getElementById('resultBox');
  const inputW       = document.getElementById('inputW');
  const inputH       = document.getElementById('inputH');
  const lockRatio    = document.getElementById('lockRatio');
  const formatSel    = document.getElementById('formatSel');
  const qualityInput = document.getElementById('qualityInput');
  const btnResize    = document.getElementById('btnResize');
  const btnDownload  = document.getElementById('btnDownload');
  const btnReset     = document.getElementById('btnReset');
  const canvas       = document.getElementById('canvas');
  const ctx          = canvas.getContext('2d');

  let origImg     = null;   // HTMLImageElement
  let origW       = 0;
  let origH       = 0;
  let resultBlob  = null;
  let origFileName = 'image';

  /* ── 拖拽支持 ───────────────────────────────── */
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  /* ── 加载图片 ────────────────────────────────── */
  function loadFile(file) {
    origFileName = file.name.replace(/\.[^.]+$/, '');

    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      origImg = img;
      origW   = img.naturalWidth;
      origH   = img.naturalHeight;

      /* 信息栏 */
      document.getElementById('infoName').textContent     = file.name;
      document.getElementById('infoSize').textContent     = `${origW} × ${origH}`;
      document.getElementById('infoFileSize').textContent = formatBytes(file.size);
      infoBar.style.display = 'flex';

      /* 预填目标尺寸 */
      inputW.value = origW;
      inputH.value = origH;

      /* 原图预览 */
      previewOrig.src = url;
      previewRow.style.display  = 'grid';
      controlsPane.style.display = 'flex';
      resultBox.innerHTML = '<span class="preview-placeholder">点击"调整并预览"后显示</span>';
      btnDownload.disabled = true;
      resultBlob = null;
    };
    img.onerror = () => alert('图片加载失败，请重试。');
    img.src = url;
  }

  /* ── 宽高联动 ────────────────────────────────── */
  inputW.addEventListener('input', () => {
    if (!lockRatio.checked || !origW) return;
    const ratio = origH / origW;
    inputH.value = Math.round(Number(inputW.value) * ratio) || '';
  });
  inputH.addEventListener('input', () => {
    if (!lockRatio.checked || !origH) return;
    const ratio = origW / origH;
    inputW.value = Math.round(Number(inputH.value) * ratio) || '';
  });

  /* ── 调整 ────────────────────────────────────── */
  btnResize.addEventListener('click', () => {
    if (!origImg) return;

    const w   = parseInt(inputW.value, 10);
    const h   = parseInt(inputH.value, 10);
    const fmt = formatSel.value;
    const q   = Math.min(100, Math.max(1, parseInt(qualityInput.value, 10) || 92)) / 100;

    if (!w || !h || w < 1 || h < 1) {
      alert('请输入有效的宽高（正整数）。');
      return;
    }

    canvas.width  = w;
    canvas.height = h;
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(origImg, 0, 0, w, h);

    canvas.toBlob(blob => {
      if (!blob) { alert('图片处理失败，请重试。'); return; }
      resultBlob = blob;

      const url = URL.createObjectURL(blob);
      const img = document.createElement('img');
      img.src = url;
      img.alt = '调整后预览';
      resultBox.innerHTML = '';
      resultBox.appendChild(img);

      btnDownload.disabled = false;
    }, fmt, q);
  });

  /* ── 下载 ────────────────────────────────────── */
  btnDownload.addEventListener('click', () => {
    if (!resultBlob) return;
    const ext  = formatSel.value.split('/')[1].replace('jpeg', 'jpg');
    const name = `${origFileName}_${inputW.value}x${inputH.value}.${ext}`;
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(resultBlob);
    a.download = name;
    a.click();
  });

  /* ── 重置 ────────────────────────────────────── */
  btnReset.addEventListener('click', () => {
    fileInput.value       = '';
    origImg               = null;
    resultBlob            = null;
    infoBar.style.display      = 'none';
    controlsPane.style.display = 'none';
    previewRow.style.display   = 'none';
    btnDownload.disabled       = true;
  });

  /* ── 工具函数 ─────────────────────────────────── */
  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(2) + ' MB';
  }
})();
</script>

</body>
</html>
