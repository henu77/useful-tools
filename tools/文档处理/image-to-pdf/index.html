<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片转A4 PDF工具</title>
    <meta name="description" content="将多张图片拖拽排序后导出为 A4 PDF，支持旋转、删除和预览。">
    <meta name="icon" content="🧾">
    <script src="../../../assets/js/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>图片转 A4 PDF 工具</h1>

    <div class="controls">
        <button class="btn btn-upload">
            <span>📂 选择图片</span>
            <input type="file" id="imageInput" multiple accept="image/*">
        </button>
        <button class="btn btn-clear" onclick="clearAll()">🗑️ 清空</button>
        <button class="btn btn-generate" id="generateBtn" onclick="generatePDF()">📄 生成 PDF</button>
    </div>

    <div id="status">请上传图片。拖拽卡片可调整顺序，点击图片可大图预览。</div>

    <div class="preview-area" id="previewList"></div>
</div>

<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="modal-close">&times;</span>
    <img class="modal-content" id="modalImage">
</div>

<script src="app.js"></script>
</body>
</html>
