<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 水印工具</title>
    <meta name="description" content="为 PDF 添加可调文字水印，支持实时预览与导出。">
    <meta name="icon" content="📄">
    <script src="../../../assets/js/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <h2>⚡ PDF 实时水印工具</h2>

        <div class="notice">
            🚀 <strong>实时预览激活：</strong> 修改下方任意参数，右侧将自动刷新。无需点击生成按钮。
        </div>

        <div class="form-group">
            <label for="pdfFile">1. 导入 PDF 文件 *</label>
            <input type="file" id="pdfFile" accept="application/pdf">
        </div>

        <div id="controls" style="opacity: 0.5; pointer-events: none;">
            <div class="form-group">
                <label for="watermarkText">2. 水印文字</label>
                <input type="text" id="watermarkText" value="机密文件 仅供内部使用">
            </div>

            <div class="form-group">
                <label for="watermarkColor">3. 水印颜色</label>
                <input type="color" id="watermarkColor" value="#ff0000">
            </div>

            <div class="form-group">
                <label for="watermarkSize">4. 字体大小</label>
                <div class="range-wrapper">
                    <input type="range" id="watermarkSize" min="12" max="100" step="2" value="30">
                    <span class="range-value" id="watermarkSizeVal">30</span>
                </div>
            </div>

            <div class="form-group">
                <label for="watermarkOpacity">5. 透明度</label>
                <div class="range-wrapper">
                    <input type="range" id="watermarkOpacity" min="0.1" max="1" step="0.1" value="0.3">
                    <span class="range-value" id="watermarkOpacityVal">0.3</span>
                </div>
            </div>

            <div class="form-group">
                <label for="watermarkAngle">6. 旋转角度</label>
                <div class="range-wrapper">
                    <input type="range" id="watermarkAngle" min="-90" max="90" step="5" value="45">
                    <span class="range-value" id="watermarkAngleVal">45°</span>
                </div>
            </div>

            <div class="form-group">
                <label for="watermarkDensity">7. 密集程度 (间距)</label>
                <div class="range-wrapper">
                    <input type="range" id="watermarkDensity" min="100" max="600" step="20" value="250">
                    <span class="range-value" id="watermarkDensityVal">250</span>
                </div>
            </div>
        </div>

        <div style="flex:1;"></div>

        <button id="downloadBtn" class="btn btn-success" onclick="downloadPDF()" disabled>下载处理后的 PDF</button>
    </div>

    <div id="preview-container">
        <div id="emptyState" class="empty-state">等待导入 PDF...</div>
        <div id="loadingState" class="loading-state">渲染中...</div>
        <iframe id="pdfPreview" title="PDF 预览"></iframe>
    </div>

    <script src="app.js"></script>
</body>
</html>
