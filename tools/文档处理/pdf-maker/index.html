<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯前端 PDF 实时水印工具 (高清版)</title>
    <meta name="description" content="为 PDF 添加可调文字水印，支持实时预览与导出。">
    <meta name="icon" content="📄">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f8f9fa;
            --border-color: #dee2e6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 350px;
            background-color: var(--bg-color);
            padding: 20px;
            box-sizing: border-box;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        #preview-container {
            flex: 1;
            background-color: #525659;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            font-size: 1.2rem;
            pointer-events: none;
        }
        .loading-state {
            position: absolute;
            top: 10px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: none;
            z-index: 10;
        }
        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #555;
            font-weight: bold;
        }
        .form-group input[type="text"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 2px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
        }
        .range-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .range-wrapper input[type="range"] {
            flex: 1;
        }
        .range-value {
            font-size: 0.85rem;
            color: #666;
            min-width: 35px;
            text-align: right;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            margin-bottom: 10px;
        }
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        .btn-success:disabled {
            background-color: #8fce9e;
            cursor: not-allowed;
        }
        .notice {
            font-size: 0.8rem;
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>⚡ PDF 实时水印工具</h2>
        
        <div class="notice">
            🚀 <strong>实时预览激活：</strong> 修改下方任意参数，右侧将自动刷新。无需点击生成按钮。
        </div>

        <div class="form-group">
            <label for="pdfFile">1. 导入 PDF 文件 *</label>
            <input type="file" id="pdfFile" accept="application/pdf">
        </div>

        <div id="controls" style="opacity: 0.5; pointer-events: none;">
            <div class="form-group">
                <label for="watermarkText">2. 水印文字</label>
                <input type="text" id="watermarkText" value="机密文件 仅供内部使用">
            </div>

            <div class="form-group">
                <label for="watermarkColor">3. 水印颜色</label>
                <input type="color" id="watermarkColor" value="#ff0000">
            </div>

            <div class="form-group">
                <label for="watermarkSize">4. 字体大小</label>
                <div class="range-wrapper">
                    <input type="range" id="watermarkSize" min="12" max="100" step="2" value="30">
                    <span class="range-value" id="watermarkSizeVal">30</span>
                </div>
            </div>

            <div class="form-group">
                <label for="watermarkOpacity">5. 透明度</label>
                <div class="range-wrapper">
                    <input type="range" id="watermarkOpacity" min="0.1" max="1" step="0.1" value="0.3">
                    <span class="range-value" id="watermarkOpacityVal">0.3</span>
                </div>
            </div>

            <div class="form-group">
                <label for="watermarkAngle">6. 旋转角度</label>
                <div class="range-wrapper">
                    <input type="range" id="watermarkAngle" min="-90" max="90" step="5" value="45">
                    <span class="range-value" id="watermarkAngleVal">45°</span>
                </div>
            </div>

            <div class="form-group">
                <label for="watermarkDensity">7. 密集程度 (间距)</label>
                <div class="range-wrapper">
                    <input type="range" id="watermarkDensity" min="100" max="600" step="20" value="250">
                    <span class="range-value" id="watermarkDensityVal">250</span>
                </div>
            </div>
        </div>

        <div style="flex:1;"></div>

        <button id="downloadBtn" class="btn btn-success" onclick="downloadPDF()" disabled>下载处理后的 PDF</button>
    </div>

    <div id="preview-container">
        <div id="emptyState" class="empty-state">等待导入 PDF...</div>
        <div id="loadingState" class="loading-state">渲染中...</div>
        <iframe id="pdfPreview" title="PDF 预览"></iframe>
    </div>

    <script>
        let originalPdfBuffer = null; // 始终保存一份“纯净无水印”的原始文件缓冲
        let currentPdfBytes = null;   // 保存当前带有水印的最新文件缓冲
        let activeBlobUrl = null;     // 用于释放内存

        // 工具函数：File 转 ArrayBuffer
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // 核心绘图：带高清缩放的文本转图像
        function createTextWatermarkImage(text, color, fontSize) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 视网膜高清倍率（设为 2 倍，让 PDF 里的图片极度清晰）
            const scale = 2; 
            const renderSize = fontSize * scale; 
            
            ctx.font = `bold ${renderSize}px sans-serif`;
            const textMetrics = ctx.measureText(text);
            const width = textMetrics.width;
            const height = renderSize * 1.5;
            
            canvas.width = width;
            canvas.height = height;
            
            ctx.font = `bold ${renderSize}px sans-serif`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, width / 2, height / 2);
            
            return {
                base64: canvas.toDataURL('image/png'),
                // 返回真实在 PDF 中应该显示的物理尺寸
                width: width / scale,
                height: height / scale
            };
        }

        // 主生成逻辑
        async function generateWatermark() {
            if (!originalPdfBuffer) return;
            
            document.getElementById('loadingState').style.display = 'block';

            try {
                // 获取当前所有表单的值
                const text = document.getElementById('watermarkText').value;
                const colorHex = document.getElementById('watermarkColor').value;
                const fontSize = parseInt(document.getElementById('watermarkSize').value);
                const opacity = parseFloat(document.getElementById('watermarkOpacity').value);
                const angle = parseInt(document.getElementById('watermarkAngle').value);
                const spacing = parseInt(document.getElementById('watermarkDensity').value);
                
                // 每次都从【最原始的无水印 PDF】重新加载，防止水印叠加黑屏
                const pdfDoc = await PDFLib.PDFDocument.load(originalPdfBuffer);
                
                if(text.trim() !== '') {
                    // 生成高清水印图片及物理尺寸
                    const watermarkData = createTextWatermarkImage(text, colorHex, fontSize);
                    const watermarkImage = await pdfDoc.embedPng(watermarkData.base64);
                    
                    const pages = pdfDoc.getPages();
                    for (const page of pages) {
                        const { width, height } = page.getSize();
                        const diagonal = Math.sqrt(width * width + height * height);
                        
                        for (let x = -diagonal; x < diagonal; x += spacing) {
                            for (let y = -diagonal; y < diagonal; y += spacing) {
                                page.drawImage(watermarkImage, {
                                    x: x,
                                    y: y,
                                    width: watermarkData.width,
                                    height: watermarkData.height,
                                    opacity: opacity,
                                    rotate: PDFLib.degrees(angle),
                                });
                            }
                        }
                    }
                }

                currentPdfBytes = await pdfDoc.save();
                
                // 清理旧的 Blob URL 释放内存
                if (activeBlobUrl) {
                    URL.revokeObjectURL(activeBlobUrl);
                }

                // 渲染新预览
                const blob = new Blob([currentPdfBytes], { type: 'application/pdf' });
                activeBlobUrl = URL.createObjectURL(blob);
                document.getElementById('pdfPreview').src = activeBlobUrl;

            } catch (error) {
                console.error(error);
            } finally {
                document.getElementById('loadingState').style.display = 'none';
            }
        }

        // 防抖函数：延迟执行，避免频繁触发卡顿
        function debounce(func, wait) {
            let timeout;
            return function() {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, arguments), wait);
            };
        }

        // 绑定防抖版本的生成函数，延迟 300ms
        const debouncedGenerate = debounce(generateWatermark, 300);

        // 监听所有输入控件的变动
        const inputs = [
            'watermarkText', 'watermarkColor', 'watermarkSize', 
            'watermarkOpacity', 'watermarkAngle', 'watermarkDensity'
        ];

        inputs.forEach(id => {
            const element = document.getElementById(id);
            element.addEventListener('input', (e) => {
                // 如果是滑动条，实时更新旁边的数值显示
                if (e.target.type === 'range') {
                    const suffix = id === 'watermarkAngle' ? '°' : '';
                    document.getElementById(id + 'Val').innerText = e.target.value + suffix;
                }
                // 触发重新生成
                debouncedGenerate();
            });
        });

        // 处理文件上传
        document.getElementById('pdfFile').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                // 1. 读取原始文件并保存在内存中
                originalPdfBuffer = await readFileAsArrayBuffer(file);
                
                // 2. 界面状态更新
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('controls').style.opacity = '1';
                document.getElementById('controls').style.pointerEvents = 'auto';
                document.getElementById('downloadBtn').disabled = false;
                
                // 3. 立即触发第一次渲染
                generateWatermark();
            }
        });

        // 处理下载
        function downloadPDF() {
            if (!currentPdfBytes) return;
            const blob = new Blob([currentPdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'watermarked_document.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
