<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 合并工具</title>
  <meta name="description" content="纯前端合并多个 PDF 文件，支持拖拽排序后导出。">
  <meta name="icon" content="📚">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #2d3748;
      --muted: #718096;
      --line: #e2e8f0;
      --accent: #2563eb;
      --danger: #dc2626;
      --ok: #16a34a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }

    h1 {
      font-size: 1.35rem;
      margin-bottom: 6px;
    }

    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .drop {
      border: 2px dashed #93c5fd;
      border-radius: var(--radius);
      padding: 30px 16px;
      text-align: center;
      background: #f8fbff;
      cursor: pointer;
      transition: 0.2s;
    }

    .drop.dragover {
      border-color: var(--accent);
      background: #eef5ff;
    }

    .drop p { color: var(--muted); }

    #fileInput { display: none; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.15s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-main { background: var(--accent); color: #fff; }
    .btn-main:hover:enabled { opacity: 0.9; }

    .btn-ghost { background: #fff; border: 1px solid var(--line); color: var(--text); }
    .btn-ghost:hover:enabled { background: #f8fafc; }

    .btn-danger { background: #fff1f2; color: var(--danger); border: 1px solid #fecdd3; }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .item {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      cursor: move;
    }

    .item.dragging { opacity: 0.45; }

    .idx {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #eff6ff;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.92rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 2px;
    }

    .status {
      min-height: 24px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 20px;
      border: 1px dashed var(--line);
      border-radius: 10px;
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .item { grid-template-columns: 28px 1fr auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>PDF 合并工具</h1>
      <p class="hint">选择多个 PDF 文件，拖拽调整顺序，点击“开始合并”后下载结果。所有处理都在本地浏览器完成。</p>
    </section>

    <section class="card">
      <label class="drop" id="dropArea">
        <input id="fileInput" type="file" accept="application/pdf" multiple>
        <p>点击选择 PDF，或拖拽 PDF 到这里</p>
      </label>
    </section>

    <section class="card">
      <div class="toolbar">
        <button class="btn btn-main" id="mergeBtn" disabled>开始合并并下载</button>
        <button class="btn btn-ghost" id="addBtn">继续添加</button>
        <button class="btn btn-danger" id="clearBtn" disabled>清空列表</button>
      </div>
      <div class="status" id="status">请先添加 PDF 文件</div>
      <div class="list" id="fileList"></div>
    </section>
  </div>

  <script>
    (function () {
      'use strict';

      const dropArea = document.getElementById('dropArea');
      const fileInput = document.getElementById('fileInput');
      const fileListEl = document.getElementById('fileList');
      const mergeBtn = document.getElementById('mergeBtn');
      const clearBtn = document.getElementById('clearBtn');
      const addBtn = document.getElementById('addBtn');
      const statusEl = document.getElementById('status');

      const files = [];
      let dragIndex = -1;

      function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = 'status' + (type ? ' ' + type : '');
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1024 / 1024).toFixed(2) + ' MB';
      }

      function renderList() {
        fileListEl.innerHTML = '';

        if (files.length === 0) {
          fileListEl.innerHTML = '<div class="empty">暂无文件</div>';
          mergeBtn.disabled = true;
          clearBtn.disabled = true;
          return;
        }

        files.forEach((f, idx) => {
          const row = document.createElement('div');
          row.className = 'item';
          row.draggable = true;
          row.dataset.index = String(idx);
          row.innerHTML = `
            <div class="idx">${idx + 1}</div>
            <div>
              <div class="name" title="${f.file.name}">${f.file.name}</div>
              <div class="meta">${formatSize(f.file.size)}</div>
            </div>
            <button class="btn btn-danger" data-remove="${idx}" style="padding:6px 10px;font-size:.8rem;">删除</button>
          `;

          row.addEventListener('dragstart', () => {
            dragIndex = idx;
            row.classList.add('dragging');
          });

          row.addEventListener('dragend', () => {
            row.classList.remove('dragging');
            dragIndex = -1;
          });

          row.addEventListener('dragover', e => {
            e.preventDefault();
          });

          row.addEventListener('drop', e => {
            e.preventDefault();
            const to = Number(row.dataset.index);
            if (dragIndex < 0 || dragIndex === to) return;
            const [moved] = files.splice(dragIndex, 1);
            files.splice(to, 0, moved);
            renderList();
            setStatus('已更新文件顺序', 'ok');
          });

          fileListEl.appendChild(row);
        });

        mergeBtn.disabled = files.length < 2;
        clearBtn.disabled = false;
      }

      function addFiles(selected) {
        let added = 0;
        for (const file of selected) {
          if (!file.name.toLowerCase().endsWith('.pdf') && file.type !== 'application/pdf') {
            continue;
          }
          files.push({ file });
          added += 1;
        }

        renderList();

        if (added === 0) {
          setStatus('未检测到有效 PDF 文件', 'err');
          return;
        }

        if (files.length < 2) {
          setStatus('至少需要 2 个 PDF 才能合并', '');
        } else {
          setStatus(`已添加 ${files.length} 个 PDF，可开始合并`, 'ok');
        }
      }

      dropArea.addEventListener('click', () => fileInput.click());
      addBtn.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', () => {
        addFiles(fileInput.files);
        fileInput.value = '';
      });

      ['dragenter', 'dragover'].forEach(type => {
        dropArea.addEventListener(type, e => {
          e.preventDefault();
          dropArea.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach(type => {
        dropArea.addEventListener(type, e => {
          e.preventDefault();
          dropArea.classList.remove('dragover');
        });
      });

      dropArea.addEventListener('drop', e => {
        addFiles(e.dataTransfer.files || []);
      });

      fileListEl.addEventListener('click', e => {
        const btn = e.target.closest('[data-remove]');
        if (!btn) return;
        const idx = Number(btn.dataset.remove);
        files.splice(idx, 1);
        renderList();
        setStatus(files.length ? '已移除文件' : '请先添加 PDF 文件', files.length ? 'ok' : '');
      });

      clearBtn.addEventListener('click', () => {
        files.length = 0;
        renderList();
        setStatus('已清空文件列表', '');
      });

      mergeBtn.addEventListener('click', async () => {
        if (files.length < 2) {
          setStatus('至少需要 2 个 PDF 文件', 'err');
          return;
        }

        mergeBtn.disabled = true;
        setStatus('正在合并，请稍候...', '');

        try {
          const outPdf = await PDFLib.PDFDocument.create();

          for (const item of files) {
            const bytes = await item.file.arrayBuffer();
            const inPdf = await PDFLib.PDFDocument.load(bytes);
            const pages = await outPdf.copyPages(inPdf, inPdf.getPageIndices());
            pages.forEach(p => outPdf.addPage(p));
          }

          const mergedBytes = await outPdf.save();
          const blob = new Blob([mergedBytes], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);

          const a = document.createElement('a');
          a.href = url;
          a.download = `merged_${Date.now()}.pdf`;
          a.click();

          URL.revokeObjectURL(url);
          setStatus('合并成功，已开始下载', 'ok');
        } catch (err) {
          console.error(err);
          setStatus('合并失败，请检查 PDF 是否损坏或受加密保护', 'err');
        } finally {
          renderList();
        }
      });

      renderList();
    })();
  </script>
</body>
</html>
