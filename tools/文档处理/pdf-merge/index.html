<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 合并工具</title>
  <meta name="description" content="纯前端合并多个 PDF 文件，支持拖拽排序、预览第一页。">
  <meta name="icon" content="📚">
  <script src="pdf.js"></script>
  <script src="pdf-lib.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>PDF 合并工具</h1>
      <p class="hint">选择多个 PDF 文件，拖拽调整顺序，点击"开始合并"后下载结果。所有处理都在本地浏览器完成。</p>
    </section>

    <section class="card">
      <label class="drop" id="dropArea">
        <input id="fileInput" type="file" accept="application/pdf" multiple>
        <p>点击选择 PDF，或拖拽 PDF 到这里</p>
      </label>
    </section>

    <section class="card">
      <div class="toolbar">
        <button class="btn btn-main" id="mergeBtn" disabled>开始合并并下载</button>
        <button class="btn btn-ghost" id="addBtn">继续添加</button>
        <button class="btn btn-danger" id="clearBtn" disabled>清空列表</button>
      </div>
      <div class="status" id="status">请先添加 PDF 文件</div>
      <div class="list" id="fileList"></div>
    </section>
  </div>

  <script>
    // 设置 PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="app.js"></script>
</body>
</html>
